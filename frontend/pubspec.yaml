name: gizigo
description: "GiziGo - Platform agregator makanan sehat untuk mahasiswa"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^15.1.2

  # HTTP Client
  dio: ^5.7.0

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.6.0
  google_sign_in: ^6.2.2

  # Geolocation
  geolocator: ^13.0.2

  # Maps
  flutter_map: ^8.3.0
  latlong2: ^0.9.1

  # Secure Storage
  flutter_secure_storage: ^9.2.4

  # URL Launcher (Deep Linking ke GoFood/GrabFood/ShopeeFood)
  url_launcher: ^6.3.1

  # Google Fonts
  google_fonts: ^6.2.1

  # Image Caching
  cached_network_image: ^3.4.1

  # Loading Shimmer
  shimmer: ^3.0.0

  # JSON Serialization
  json_annotation: ^4.9.0

  # Equatable (for model comparison)
  equatable: ^2.0.7

  # Flutter SVG
  flutter_svg: ^2.0.17

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.3
  json_serializable: ^6.9.4
  go_router_builder: ^2.8.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/icons/categories-menu/
    - assets/fonts/
